<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRIB CONFIG</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #18181b; --accent: #8b91f0; --border: rgba(255,255,255,0.15); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); overflow: hidden; height: 100vh; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; }
  .module-bar {
    height: 38px; display: flex; align-items: stretch;
    background: #111113; border-bottom: 1px solid var(--border);
    flex-shrink: 0; padding: 0 4px;
  }
  .module-tab {
    padding: 0 18px; cursor: pointer; color: #777;
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
    display: flex; align-items: center;
    border-bottom: 2px solid transparent;
    transition: all 0.15s; text-transform: uppercase;
  }
  .module-tab:hover { color: #bbb; }
  .module-tab.active { color: #fff; border-bottom-color: var(--accent); }
  iframe { flex: 1; border: none; width: 100%; }
</style>
</head>
<body>
<div class="module-bar">
  <div class="module-tab active" onclick="switchModule('channels', this)">Channels</div>
  <div class="module-tab" onclick="switchModule('agent', this)">Agent</div>
  <div class="module-tab" onclick="switchModule('memory', this)">Memory</div>
  <div class="module-tab" onclick="switchModule('search', this)">Search</div>
</div>
<iframe id="frame" src="/module/channels"></iframe>
<script>
function switchModule(m, el) {
  document.querySelectorAll('.module-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('frame').src = '/module/' + m;
}
</script>
</body>
</html>
